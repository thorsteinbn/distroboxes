name: Build Container Images

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  generate-matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Generate matrix
        id: set-matrix
        run: |
          matrix=$(find . -name Containerfile -type f | sed 's|^\./||' | sed 's|/Containerfile||' | jq -R -s -c 'split("\n") | map(select(. != "")) | {containerfile: .}')
          echo "matrix=$matrix" >> $GITHUB_OUTPUT

  build:
    needs: generate-matrix
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      matrix: ${{ fromJson(needs.generate-matrix.outputs.matrix) }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        if: github.event_name == 'push'
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository_owner }}/distroboxes
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix={{branch}}-
            type=raw,value=${{ matrix.containerfile }},enable={{is_default_branch}}
            type=raw,value=${{ matrix.containerfile }},suffix=-{{sha}},enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.containerfile }}
          file: ${{ matrix.containerfile }}/Containerfile
          push: ${{ github.event_name == 'push' }}
          tags: ${{ github.event_name == 'push' && steps.meta.outputs.tags || '' }}
          labels: ${{ github.event_name == 'push' && steps.meta.outputs.labels || '' }}